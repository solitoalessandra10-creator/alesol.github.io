<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MySite - Homework</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">

  <aside class="sidebar">
    <!-- Logo / profilo -->
    <div class="logo">
      <div class="profile-circle">
        <img src="images/profile.jpg" >
      </div>
      <span class="email"><a href="mailto:solito.2249863@studenti.uniroma1.it">solito.2249863@studenti.uniroma1.it</a></span>
    </div>

    <!-- Menu -->
    <nav class="menu">
      <a href="index.html">Homepage</a>
      <a href="whoiam.html">Who I am</a>
      <a href="homework.html" class="active">Homework</a>
    </nav>

    <!-- Footer -->
    <div class="sidebar-footer">
      <p>© 2026 MySite</p>
    </div>
  </aside>

  <!-- Main content -->
  <main class="content">
    <article class="post">
      <h1>Homework</h1>
      <p>My name is Alessandra Solito and this is my personal blog dedicated to the collection and submission of homework assignments for the Applied Statistics course.</p>
    </article>

    <!-- Tasto Add Homework -->
    <button id="openModal" class="add-btn">+ Add New Homework</button>

    <!-- Container delle cards -->
    <div id="homeworkContainer" class="homework-container"></div>
  </main>
</div>

<!-- Modal per nuovo homework (fuori dal main) -->
<div id="homeworkModal" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <h2>New Homework</h2>
    <form id="homeworkForm">
      <label for="weekTitle">Titolo Settimana:</label>
      <input type="text" id="weekTitle" name="weekTitle" required>

      <label for="description">Descrizione:</label>
      <textarea id="description" name="description" rows="4" required></textarea>

      <div style="margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px;">
        <button type="button" id="cancelBtn">Annulla</button>
        <button type="submit">Salva</button>
      </div>
    </form>
  </div>
</div>
<script>
const modal = document.getElementById("homeworkModal");
const openBtn = document.getElementById("openModal");
const closeBtn = document.querySelector(".close");
const cancelBtn = document.getElementById("cancelBtn");
const form = document.getElementById("homeworkForm");
const container = document.getElementById("homeworkContainer");

// --- Funzione per creare una card ---
function createCard(title, description, index) {
  const card = document.createElement("div");
  card.className = "homework-card";

  // Contenitore interno per titolo + delete
  const inner = document.createElement("div");
  inner.style.display = "flex";
  inner.style.justifyContent = "space-between";
  inner.style.alignItems = "center";

  const titleSpan = document.createElement("span");
  titleSpan.textContent = title;

  const deleteBtn = document.createElement("button");
  deleteBtn.textContent = "❌";
  deleteBtn.style.background = "transparent";
  deleteBtn.style.border = "none";
  deleteBtn.style.cursor = "pointer";
  deleteBtn.style.fontSize = "16px";
  deleteBtn.title = "Elimina homework";

  deleteBtn.onclick = (e) => {
    e.stopPropagation(); // Previene l’apertura del popup
    removeHomework(index);
    card.remove();
    refreshIndexes(); // Aggiorna gli indici dopo la rimozione
  };

  inner.appendChild(titleSpan);
  inner.appendChild(deleteBtn);
  card.appendChild(inner);

  // Click sulla card apre popup
  card.onclick = () => {
    const descModal = document.createElement("div");
    descModal.className = "modal";
    descModal.innerHTML = `
      <div class="modal-content">
        <span class="close">&times;</span>
        <h2>${title}</h2>
        <p>${description}</p>
        <div style="text-align:right; margin-top:15px;">
          <button class="close-btn">Chiudi</button>
        </div>
      </div>
    `;
    document.body.appendChild(descModal);

    const closeButtons = descModal.querySelectorAll(".close, .close-btn");
    closeButtons.forEach(btn => btn.onclick = () => descModal.remove());
    descModal.style.display = "flex";
  };

  container.appendChild(card);
}

// --- Funzioni LocalStorage ---
function saveHomework(title, description) {
  let homework = JSON.parse(localStorage.getItem("homeworkList")) || [];
  homework.push({ title, description });
  localStorage.setItem("homeworkList", JSON.stringify(homework));
}

function removeHomework(index) {
  let homework = JSON.parse(localStorage.getItem("homeworkList")) || [];
  homework.splice(index, 1);
  localStorage.setItem("homeworkList", JSON.stringify(homework));
}

function loadHomework() {
  const homework = JSON.parse(localStorage.getItem("homeworkList")) || [];
  homework.forEach((item, index) => createCard(item.title, item.description, index));
}

// Aggiorna gli indici delle card dopo eliminazioni
function refreshIndexes() {
  const cards = container.querySelectorAll(".homework-card");
  cards.forEach((card, i) => {
    const deleteBtn = card.querySelector("button");
    deleteBtn.onclick = (e) => {
      e.stopPropagation();
      removeHomework(i);
      card.remove();
      refreshIndexes();
    };
  });
}

// --- Eventi modal ---
openBtn.onclick = () => { modal.style.display = "flex"; }
closeBtn.onclick = cancelBtn.onclick = () => { modal.style.display = "none"; }
window.onclick = (e) => { if(e.target == modal) modal.style.display = "none"; }

// --- Submit form ---
form.onsubmit = (e) => {
  e.preventDefault();
  const title = form.weekTitle.value;
  const description = form.description.value;

  createCard(title, description, JSON.parse(localStorage.getItem("homeworkList") || "[]").length);
  saveHomework(title, description);

  form.reset();
  modal.style.display = "none";
};

// --- Carica le card salvate all’avvio ---
loadHomework();
</script>

</body>
</html>
