<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MySite - Homework</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">
      <div class="profile-circle">
        <img src="images/profile.jpg" alt="Profile Picture">
      </div>
      <span class="email">
        <a href="mailto:solito.2249863@studenti.uniroma1.it">
          solito.2249863@studenti.uniroma1.it
        </a>
      </span>
    </div>

    <nav class="menu">
      <a href="index.html">Homepage</a>
      <a href="whoiam.html">Who I am</a>
      <a href="homework.html" class="active">Homework</a>
    </nav>

    <div class="sidebar-footer">
      <p>© 2026 MySite</p>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="content">
    <article class="post">
      <h1>Homework</h1>
      <p>
        My name is Alessandra Solito and this is my personal blog dedicated to the
        collection and submission of homework assignments for the Applied Statistics course.
      </p>
    </article>

    <button id="openModal" class="add-btn">+ Add New Homework</button>

    <div id="homeworkContainer" class="homework-container"></div>
  </main>

</div>

<!-- MODAL -->
<div id="homeworkModal" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <h2>New Homework</h2>
    <form id="homeworkForm">
      <label>Title</label>
      <input type="text" id="weekTitle" required>

      <label>Task</label>
      <input type="text" id="task" required>

      <label>Description</label>
      <textarea id="description" rows="4" required></textarea>

      <label>File (.pdf or .java)</label>
      <input type="file" id="fileInput" accept=".pdf,.java">

      <div class="modal-buttons">
        <button type="button" id="cancelBtn">Cancel</button>
        <button type="submit">Save</button>
      </div>
    </form>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
