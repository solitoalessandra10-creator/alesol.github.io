<meta name="viewport" content="width=device-width, initial-scale=1.0">

<main class="content">

<article class="post">
<h1>Homework</h1>
<p>
My name is Alessandra Solito and this is my personal blog dedicated to the
collection and submission of homework assignments for the Applied Statistics course.
</p>
</article>

<button id="openModal" class="add-btn">+ Add New Homework</button>

<div id="homeworkContainer" class="homework-container"></div>

</main>
</div>

<!-- MODAL -->
<div id="homeworkModal" class="modal">

<div class="modal-content">

<span class="close">&times;</span>

<h2>New Homework</h2>

<form id="homeworkForm">

<label>Titolo Settimana</label>
<input type="text" id="weekTitle" required>

<label>Task</label>
<input type="text" id="task" required>

<label>Descrizione</label>
<textarea id="description" rows="4" required></textarea>

<label>File (.pdf o .java)</label>
<input type="file" id="fileInput" accept=".pdf,.java">

<div style="margin-top:20px;display:flex;justify-content:flex-end;gap:10px;">
<button type="button" id="cancelBtn">Annulla</button>
<button type="submit">Salva</button>
</div>

</form>
</div>
</div>

<script>

const modal = document.getElementById("homeworkModal");
const openBtn = document.getElementById("openModal");
const closeBtn = document.querySelector(".close");
const cancelBtn = document.getElementById("cancelBtn");
const form = document.getElementById("homeworkForm");
const container = document.getElementById("homeworkContainer");

openBtn.onclick = () => modal.style.display="flex";
closeBtn.onclick = cancelBtn.onclick = () => modal.style.display="none";

window.onclick = (e)=>{
if(e.target==modal) modal.style.display="none";
};

function createCard(title,task,description,date,fileName,fileData,index){

const card=document.createElement("div");
card.className="homework-card";

const header=document.createElement("div");
header.style.display="flex";
header.style.justifyContent="space-between";
header.style.alignItems="center";

const titleSpan=document.createElement("span");
titleSpan.textContent=title;
titleSpan.style.fontWeight="bold";

const deleteBtn=document.createElement("button");
deleteBtn.textContent="❌";
deleteBtn.style.border="none";
deleteBtn.style.background="transparent";
deleteBtn.style.cursor="pointer";

deleteBtn.onclick=(e)=>{
e.stopPropagation();
removeHomework(index);
card.remove();
refreshIndexes();
};

header.appendChild(titleSpan);
header.appendChild(deleteBtn);

card.appendChild(header);

const content=document.createElement("div");
content.style.display="none";
content.style.marginTop="10px";

let fileHTML="";

if(fileData){
fileHTML=`<p><a href="${fileData}" download="${fileName}">Download ${fileName}</a></p>`;
}

content.innerHTML=`
<p><strong>Task:</strong> ${task}</p>
<p>${description}</p>
<p><em>Creata il: ${date}</em></p>
${fileHTML}
`;

header.onclick=()=>{
content.style.display=
content.style.display==="none"?"block":"none";
};

card.appendChild(content);
container.appendChild(card);

}

function saveHomework(hw){

let list=JSON.parse(localStorage.getItem("homeworkList"))||[];
list.push(hw);
localStorage.setItem("homeworkList",JSON.stringify(list));

}

function removeHomework(index){

let list=JSON.parse(localStorage.getItem("homeworkList"))||[];
list.splice(index,1);
localStorage.setItem("homeworkList",JSON.stringify(list));

}

function loadHomework(){

const list=JSON.parse(localStorage.getItem("homeworkList"))||[];

list.forEach((item,index)=>{

createCard(
item.title,
item.task,
item.description,
item.date,
item.fileName,
item.fileData,
index
);

});

}

function refreshIndexes(){

const cards=container.querySelectorAll(".homework-card");

cards.forEach((card,i)=>{

const deleteBtn=card.querySelector("button");

deleteBtn.onclick=(e)=>{
e.stopPropagation();
removeHomework(i);
card.remove();
refreshIndexes();
};

});

}

form.onsubmit=(e)=>{

e.preventDefault();

const title=document.getElementById("weekTitle").value;
const task=document.getElementById("task").value;
const description=document.getElementById("description").value;

const file=document.getElementById("fileInput").files[0];

const date=new Date().toLocaleDateString();

if(file){

const reader=new FileReader();

reader.onload=function(){

const hw={
title,
task,
description,
date,
fileName:file.name,
fileData:reader.result
};

createCard(title,task,description,date,file.name,reader.result,
JSON.parse(localStorage.getItem("homeworkList")||"[]").length);

saveHomework(hw);

};

reader.readAsDataURL(file);

}else{

const hw={
title,
task,
description,
date,
fileName:null,
fileData:null
};

createCard(title,task,description,date,null,null,
JSON.parse(localStorage.getItem("homeworkList")||"[]").length);

saveHomework(hw);

}

form.reset();
modal.style.display="none";

};

loadHomework();

</script>

</body>
</html>
